<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WorkTrack" />
    <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta name="description" content="Track attendance, manage leaves, handle recruitment, and generate HR insights — all in one platform." />
    <meta property="og:title" content="WorkTrack — HR Management Platform" />
    <meta property="og:description" content="Track attendance, manage leaves, handle recruitment, and generate HR insights — all in one platform." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo.svg" />
    <title>WorkTrack</title>
    <link rel="icon" href="/favicon.svg" />
    <link rel="icon" href="/logo.svg" sizes="any" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <link rel="mask-icon" href="/logo.svg" color="#6366f1" />
    <link rel="manifest" href="/manifest.json" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <style>
      #splash {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #09090b;
        opacity: 1; visibility: visible;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #splash.hide { opacity: 0; visibility: hidden; }
      #splash-logo { width: 72px; height: 72px; margin-bottom: 20px; }
      #splash-spinner {
        width: 24px; height: 24px;
        border: 2px solid rgba(255,255,255,0.1);
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img id="splash-logo" src="/logo.svg" alt="WorkTrack" />
      <div id="splash-spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => document.getElementById('splash')?.classList.add('hide'), 300);
      });
    </script>
  </body>
</html>
