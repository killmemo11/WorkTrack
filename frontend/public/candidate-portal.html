<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WorkTrack — Candidate Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f8fc;--white:#fff;--surface:#f0f2f8;--border:#e2e6f0;--border2:#ccd2e3;
  --text:#1a1d2e;--text2:#5a6280;--text3:#9ba3c0;
  --accent:#2b5ce6;--accent2:#1e44c8;--accent-light:#eef2fd;
  --green:#16a34a;--green-bg:#f0fdf4;--amber:#d97706;--amber-bg:#fffbeb;
  --red:#dc2626;--red-bg:#fef2f2;--purple:#7c3aed;--purple-bg:#f5f3ff;
  --font:'Sora',sans-serif;--mono:'DM Mono',monospace;
  --r:12px;--r-sm:8px;--shadow:0 2px 16px rgba(43,92,230,.08);
}
html{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px}
body{max-width:780px;margin:0 auto;padding:0 16px 60px}
.navbar{display:flex;align-items:center;padding:18px 0;margin-bottom:8px;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text)}
.logo-icon{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff}
.logo-name{font-size:16px;font-weight:700}.logo-tag{font-size:11px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px}
.spacer{flex:1}
.nav-links{display:flex;gap:4px}
.nav-link{padding:7px 14px;border-radius:var(--r-sm);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;border:none;background:none;font-family:var(--font)}
.nav-link:hover{background:var(--surface);color:var(--text)}.nav-link.active{background:var(--accent-light);color:var(--accent)}
.hero{text-align:center;padding:48px 20px 36px}
.hero-eyebrow{display:inline-flex;align-items:center;gap:6px;background:var(--accent-light);color:var(--accent);font-size:12px;font-weight:600;padding:5px 14px;border-radius:20px;margin-bottom:20px;font-family:var(--mono)}
.hero h1{font-size:34px;font-weight:700;letter-spacing:-1px;line-height:1.15;margin-bottom:12px}
.hero h1 span{color:var(--accent)}.hero p{font-size:15px;color:var(--text2);max-width:480px;margin:0 auto 28px;line-height:1.65}
.hero-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 22px;border-radius:var(--r-sm);font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);transition:all .15s}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(43,92,230,.25)}.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-outline{background:var(--white);color:var(--text);border:1.5px solid var(--border2)}.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:8px 14px;font-size:13px}.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px}
.card-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.card-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.card-icon.blue{background:var(--accent-light)}.card-icon.green{background:var(--green-bg)}.card-icon.amber{background:var(--amber-bg)}.card-icon.purple{background:var(--purple-bg)}
.card-title{font-size:15px;font-weight:700}.card-sub{font-size:12px;color:var(--text3)}
.card-body{padding:24px}.card-body.p0{padding:0}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-group{display:flex;flex-direction:column;gap:5px}.form-group.full{grid-column:1/-1}
label{font-size:12px;font-weight:600;color:var(--text2)}.required::after{content:" *";color:var(--red)}
input,select,textarea{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px 14px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:all .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--white);box-shadow:0 0 0 3px rgba(43,92,230,.08)}
input::placeholder,textarea::placeholder{color:var(--text3)}textarea{resize:vertical;min-height:90px}
.file-drop{border:2px dashed var(--border2);border-radius:var(--r);padding:28px;text-align:center;cursor:pointer;transition:all .2s}
.file-drop:hover{border-color:var(--accent);background:var(--accent-light)}.file-drop.has-file{border-color:var(--green);background:var(--green-bg)}
.file-drop-icon{font-size:28px;margin-bottom:8px}.file-drop p{font-size:13px;color:var(--text2)}.file-drop .hint{font-size:11px;color:var(--text3);margin-top:4px}
.steps{display:flex;align-items:flex-start;justify-content:center;margin-bottom:32px;padding:0 10px}
.step{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;position:relative}
.step:not(:last-child)::after{content:'';position:absolute;top:16px;left:50%;width:100%;height:2px;background:var(--border);z-index:0}
.step:not(:last-child).done::after{background:var(--accent)}
.step-circle{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;z-index:1;transition:all .3s;color:var(--text3)}
.step.done .step-circle{background:var(--accent);border-color:var(--accent);color:#fff}
.step.current .step-circle{border-color:var(--accent);color:var(--accent);box-shadow:0 0 0 4px var(--accent-light)}
.step-label{font-size:11px;color:var(--text3);font-weight:500;text-align:center}
.step.done .step-label,.step.current .step-label{color:var(--accent)}
.status-track{display:flex;flex-direction:column}
.track-item{display:flex;gap:16px;padding-bottom:24px}
.track-item:last-child{padding-bottom:0}
.track-left{display:flex;flex-direction:column;align-items:center;width:36px;flex-shrink:0}
.track-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;border:2px solid var(--border);background:var(--white);z-index:1;flex-shrink:0}
.track-dot.done{background:var(--green-bg);border-color:var(--green)}.track-dot.current{background:var(--accent-light);border-color:var(--accent);box-shadow:0 0 0 4px rgba(43,92,230,.1)}.track-dot.pending{background:var(--bg)}
.track-line{flex:1;width:2px;background:var(--border);margin-top:4px}.track-line.done{background:var(--green)}
.track-right{flex:1;padding-top:6px}.track-title{font-size:14px;font-weight:600;margin-bottom:2px}
.track-date{font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:4px}
.track-note{font-size:12px;color:var(--text2);background:var(--surface);padding:8px 12px;border-radius:var(--r-sm);border-left:2px solid var(--border2);line-height:1.5}
.track-note.green{border-left-color:var(--green);background:var(--green-bg);color:var(--green)}
.track-note.blue{border-left-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.chip-blue{background:var(--accent-light);color:var(--accent)}.chip-green{background:var(--green-bg);color:var(--green)}
.chip-amber{background:var(--amber-bg);color:var(--amber)}.chip-purple{background:var(--purple-bg);color:var(--purple)}
.alert{border-radius:var(--r-sm);padding:12px 16px;font-size:13px;display:flex;align-items:flex-start;gap:10px;line-height:1.5}
.alert.info{background:var(--accent-light);color:var(--accent);border:1px solid #c0d2fb}
.alert.success{background:var(--green-bg);color:var(--green);border:1px solid #bbf7d0}
.alert.warning{background:var(--amber-bg);color:var(--amber);border:1px solid #fde68a}
.alert.error{background:var(--red-bg);color:var(--red);border:1px solid #fecaca}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}.info-label{font-size:13px;color:var(--text2)}.info-val{font-size:13px;font-weight:600}
.divider{height:1px;background:var(--border);margin:20px 0}
.loading{text-align:center;padding:60px;color:var(--text3);font-size:14px}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}.hero h1{font-size:26px}.step-label{display:none}}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--text2);text-decoration:none;font-size:13px;margin-bottom:16px;cursor:pointer}
.back-link:hover{color:var(--accent)}
</style>
</head>
<body>
<nav class="navbar">
  <a href="/candidate-portal.html" class="logo" style="text-decoration:none;color:var(--text)">
    <div class="logo-icon">🏠</div>
    <div><div class="logo-name">WorkTrack</div><div class="logo-tag">Candidate Portal</div></div>
  </a>
  <div class="spacer"></div>
  <div class="nav-links">
    <button class="nav-link active" onclick="showView('home')">Home</button>
    <button class="nav-link" onclick="showView('apply')">Apply</button>
    <button class="nav-link" onclick="showView('track')">Track Status</button>
    <button class="nav-link" onclick="showView('interviews')">My Interviews</button>
  </div>
</nav>
<div id="view-area"><div class="loading">⏳ Loading...</div></div>
<div id="toast-container"></div>

<script>
// ── STATE ──────────────────────────────────────────────────
let applyStep = 1;
let appData   = {};
let jobsList  = [];
let interviewsList = [];
let showInterviewRoom = null;

// ── API helpers ────────────────────────────────────────────
async function apiGet(path) {
  const r = await fetch(path);
  return r.json();
}

async function apiPost(path, body) {
  const r = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ── Toast ──────────────────────────────────────────────────
function showToast(msg, type = 'info') {
  let ct = document.getElementById('toast-container');
  if (!ct) return;
  const s = document.createElement('style');
  s.textContent = '@keyframes rfIn{from{transform:translateX(60px);opacity:0}to{transform:none;opacity:1}}';
  document.head.appendChild(s);
  const colors = {success:'#2ec97e',info:'#4f8ef7',warning:'#f5a623',error:'#f05252'};
  const t = document.createElement('div');
  t.style.cssText = `background:#232838;border:1px solid #333848;border-left:3px solid ${colors[type]||colors.info};border-radius:8px;padding:12px 16px;font-size:13px;color:#e8eaf0;font-family:'Sora',sans-serif;box-shadow:0 4px 20px rgba(0,0,0,.4);max-width:320px;animation:rfIn .2s ease`;
  t.textContent = msg;
  ct.appendChild(t);
  setTimeout(() => { t.style.transition='opacity .3s'; t.style.opacity='0'; setTimeout(() => t.remove(), 300); }, 3200);
}

// ── BOOT ──────────────────────────────────────────────────
async function boot() {
  try {
    jobsList = await apiGet('/api/jobs/active');
  } catch { /* no jobs */ }
  showView('home');
}

// ── NAV ───────────────────────────────────────────────────
function showView(v) {
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  const idx = {home:0,apply:1,track:2,interviews:3};
  document.querySelectorAll('.nav-link')[idx[v]]?.classList.add('active');
  const area = document.getElementById('view-area');
  if (v === 'home')  renderHome(area);
  if (v === 'apply') renderApply(area);
  if (v === 'track') renderTrack(area);
  if (v === 'interviews') renderInterviews(area);
}

// ── HOME ──────────────────────────────────────────────────
function renderHome(area) {
  area.innerHTML = `
  <div class="hero">
    <div class="hero-eyebrow">🎯 Now Hiring</div>
    <h1>Find Your Next<br/><span>Opportunity</span></h1>
    <p>Apply for open positions, track your application status — all in one place.</p>
    <div class="hero-btns">
      <button class="btn btn-primary" onclick="showView('apply')">Apply Now →</button>
      <button class="btn btn-outline" onclick="showView('track')">Track My Application</button>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px">
    ${[['📋','Easy Application','Submit your CV and details in minutes'],
       ['📊','Real-Time Tracking','See exactly where you are in the process'],
       ['🔔','Instant Notifications','Get updates via email']]
      .map(([i,t,s])=>`<div class="card" style="margin-bottom:0;text-align:center;padding:20px 16px">
        <div style="font-size:28px;margin-bottom:8px">${i}</div>
        <div style="font-size:13px;font-weight:700;margin-bottom:4px">${t}</div>
        <div style="font-size:12px;color:var(--text3)">${s}</div>
      </div>`).join('')}
  </div>
  <div class="card">
    <div class="card-header">
      <div class="card-icon blue">💼</div>
      <div><div class="card-title">Open Positions</div><div class="card-sub">Currently accepting applications</div></div>
    </div>
    <div class="card-body p0">
      ${(jobsList||[]).filter(j=>j.status==='active'||j.status===undefined).map(j=>`
      <div style="display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border)">
        <div style="flex:1">
          <div style="font-size:14px;font-weight:600;margin-bottom:2px">${j.title}</div>
          <div style="font-size:12px;color:var(--text3)">${j.department||'—'} · ${j.type||'Full-Time'}</div>
        </div>
        <span class="chip ${j.technical?'chip-purple':'chip-blue'}">${j.technical?'Technical':'General'}</span>
        <button class="btn btn-primary btn-sm" onclick="prefillJob('${j.title.replace(/'/g,"\\'")}')">Apply</button>
      </div>`).join('')}
      ${!(jobsList||[]).length?'<div style="padding:30px;text-align:center;color:var(--text3)">No open positions at the moment</div>':''}
    </div>
  </div>`;
}

function prefillJob(title) {
  appData.job_title = title;
  applyStep = 1;
  showView('apply');
}

// ── APPLY ─────────────────────────────────────────────────
function renderApply(area) {
  if (applyStep === 4) { renderApplySuccess(area); return; }
  const stepsHtml = `
  <div style="display:flex;justify-content:flex-start;margin-bottom:8px">
    <span class="back-link" onclick="applyStep=1;appData={};showView('home')">← Back to Jobs</span>
  </div>
  <div class="steps" style="margin-top:8px">
    ${[{n:1,l:'Personal Info'},{n:2,l:'Experience'},{n:3,l:'Upload CV'}].map((s,i)=>`
      <div class="step ${applyStep>s.n?'done':applyStep===s.n?'current':''}">
        <div class="step-circle">${applyStep>s.n?'✓':s.n}</div>
        <div class="step-label">${s.l}</div>
      </div>
      ${i<2?`<div style="flex:1;height:2px;background:${applyStep>s.n?'var(--accent)':'var(--border)'};margin-top:16px"></div>`:''}`
    ).join('')}
  </div>`;
  area.innerHTML = stepsHtml + (applyStep===1?step1Html():applyStep===2?step2Html():step3Html());
}

function step1Html() {
  return `<div class="card">
    <div class="card-header"><div class="card-icon blue">👤</div><div><div class="card-title">Personal Information</div><div class="card-sub">Step 1 of 3</div></div></div>
    <div class="card-body">
      <div class="form-grid">
        <div class="form-group"><label class="required">First Name</label><input id="f-fname" value="${appData.fname||''}" placeholder="Ahmed"/></div>
        <div class="form-group"><label class="required">Last Name</label><input id="f-lname" value="${appData.lname||''}" placeholder="Mohamed"/></div>
        <div class="form-group"><label class="required">Email</label><input id="f-email" type="email" value="${appData.email||''}" placeholder="ahmed@email.com"/></div>
        <div class="form-group"><label class="required">Phone</label><input id="f-phone" value="${appData.phone||''}" placeholder="010xxxxxxxx"/></div>
        <div class="form-group"><label class="required">Applying For</label>
          <select id="f-job">
            <option value="">Select position...</option>
            ${(jobsList||[]).map(j=>`<option ${appData.job_title===j.title?'selected':''} value="${j.title}">${j.title}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>LinkedIn</label><input id="f-linkedin" value="${appData.linkedin||''}" placeholder="linkedin.com/in/yourname"/></div>
        <div class="form-group full"><label>City / Location</label><input id="f-city" value="${appData.city||''}" placeholder="Cairo, Egypt"/></div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:8px">
        <button class="btn btn-primary" onclick="step1Next()">Continue →</button>
      </div>
    </div>
  </div>`;
}

function step1Next() {
  const fname = document.getElementById('f-fname').value.trim();
  const lname = document.getElementById('f-lname').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const job   = document.getElementById('f-job').value;
  if (!fname||!lname||!email||!job) { showToast('Please fill all required fields','warning'); return; }
  Object.assign(appData, {fname,lname,email,
    phone:    document.getElementById('f-phone').value,
    job_title:job,
    linkedin: document.getElementById('f-linkedin').value,
    city:     document.getElementById('f-city').value,
  });
  applyStep = 2;
  showView('apply');
}

function step2Html() {
  return `<div class="card">
    <div class="card-header"><div class="card-icon amber">💼</div><div><div class="card-title">Experience & Education</div><div class="card-sub">Step 2 of 3</div></div></div>
    <div class="card-body">
      <div class="form-grid">
        <div class="form-group"><label class="required">Years of Experience</label>
          <select id="f-exp">
            ${['Fresh Graduate (0 years)','1 – 2 years','3 – 5 years','6 – 10 years','10+ years'].map(e=>`<option ${appData.exp===e?'selected':''}>${e}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label class="required">Education Level</label>
          <select id="f-edu">
            ${["Bachelor's Degree","Master's Degree","PhD","Diploma","High School"].map(e=>`<option ${appData.edu===e?'selected':''}>${e}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>Most Recent Employer</label><input id="f-employer" value="${appData.employer||''}" placeholder="Company name"/></div>
        <div class="form-group"><label>Most Recent Title</label><input id="f-jobtitle" value="${appData.jobtitle||''}" placeholder="Your job title"/></div>
        <div class="form-group full"><label>Key Skills</label><input id="f-skills" value="${appData.skills||''}" placeholder="Excel, Python, SQL..."/></div>
        <div class="form-group full"><label>Cover Letter / Motivation</label>
          <textarea id="f-cover" rows="5" placeholder="Why are you interested in this role?">${appData.cover||''}</textarea>
        </div>
        <div class="form-group"><label>Expected Salary (EGP/month)</label><input id="f-salary" value="${appData.salary||''}" placeholder="e.g. 25,000"/></div>
        <div class="form-group"><label>Earliest Start Date</label><input id="f-start" type="date" value="${appData.start||''}"/></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:8px">
        <button class="btn btn-outline" onclick="applyStep=1;showView('apply')">← Back</button>
        <button class="btn btn-primary" onclick="step2Next()">Continue →</button>
      </div>
    </div>
  </div>`;
}

function step2Next() {
  Object.assign(appData, {
    exp:      document.getElementById('f-exp').value,
    edu:      document.getElementById('f-edu').value,
    employer: document.getElementById('f-employer').value,
    jobtitle: document.getElementById('f-jobtitle').value,
    skills:   document.getElementById('f-skills').value,
    cover:    document.getElementById('f-cover').value,
    salary:   document.getElementById('f-salary').value,
    start:    document.getElementById('f-start').value,
  });
  applyStep = 3;
  showView('apply');
}

function step3Html() {
  return `<div class="card">
    <div class="card-header"><div class="card-icon green">📎</div><div><div class="card-title">Upload CV & Submit</div><div class="card-sub">Step 3 of 3</div></div></div>
    <div class="card-body">
      <div class="file-drop ${appData.cvFile?'has-file':''}" id="file-drop" onclick="document.getElementById('cv-input').click()">
        <div class="file-drop-icon">📄</div>
        <p id="file-label">${appData.cvFile?'✅ '+appData.cvFile:'Click to upload or drag & drop your CV'}</p>
        <div class="hint">PDF, DOC, DOCX — max 5MB</div>
      </div>
      <input type="file" id="cv-input" style="display:none" accept=".pdf,.doc,.docx" onchange="handleFile(this)"/>
      <div class="divider"></div>
      <div class="alert info" style="margin-bottom:16px"><span>ℹ️</span><span>By submitting, you confirm all information is accurate.</span></div>
      <div style="background:var(--surface);border-radius:var(--r-sm);padding:16px;margin-bottom:16px">
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;font-family:var(--mono)">Summary</div>
        <div class="info-row"><span class="info-label">Name</span><span class="info-val">${appData.fname} ${appData.lname}</span></div>
        <div class="info-row"><span class="info-label">Position</span><span class="info-val">${appData.job_title}</span></div>
        <div class="info-row"><span class="info-label">Email</span><span class="info-val">${appData.email}</span></div>
        <div class="info-row"><span class="info-label">Experience</span><span class="info-val">${appData.exp||'—'}</span></div>
      </div>
      <div style="display:flex;justify-content:space-between">
        <button class="btn btn-outline" onclick="applyStep=2;showView('apply')">← Back</button>
        <button class="btn btn-primary" onclick="submitApplication()">Submit Application ✓</button>
      </div>
    </div>
  </div>`;
}

function handleFile(input) {
  if (input.files[0]) {
    appData.cvFile = input.files[0].name;
    document.getElementById('file-label').textContent = '✅ ' + input.files[0].name;
    document.getElementById('file-drop').classList.add('has-file');
  }
}

async function submitApplication() {
  try {
    const matched = (jobsList||[]).find(j => j.title === appData.job_title);
    const result = await apiPost('/api/apply', {
      name:      `${appData.fname} ${appData.lname}`,
      email:     appData.email,
      phone:     appData.phone || '',
      job_id:    matched ? matched.id : null,
      job_title: appData.job_title,
      cover:     appData.cover || '',
      source:    'Portal',
    });
    appData.ref = result.ref;
    applyStep = 4;
    showView('apply');
  } catch(e) {
    showToast(e.message || 'Submission failed', 'error');
  }
}

function renderApplySuccess(area) {
  area.innerHTML = `
  <div style="text-align:center;padding:60px 20px 40px">
    <div style="font-size:64px;margin-bottom:16px">🎉</div>
    <h2 style="font-size:26px;font-weight:700;margin-bottom:8px">Application Submitted!</h2>
    <p style="font-size:15px;color:var(--text2);margin-bottom:6px">Your reference number:</p>
    <div style="font-size:22px;font-weight:700;font-family:var(--mono);color:var(--accent);margin-bottom:24px">${appData.ref}</div>
    <p style="font-size:14px;color:var(--text2);max-width:420px;margin:0 auto 28px;line-height:1.7">
      Application submitted for <strong>${appData.job_title}</strong>. We will contact you at <strong>${appData.email}</strong> within 3 business days.
    </p>
    <div class="alert success" style="max-width:440px;margin:0 auto 24px;text-align:left">
      <span>✅</span><span>Confirmation sent to your email address.</span>
    </div>
    <div style="display:flex;gap:12px;justify-content:center">
      <button class="btn btn-outline" onclick="applyStep=1;appData={};showView('home')">Back to Home</button>
      <button class="btn btn-primary" onclick="showView('track')">Track Status →</button>
    </div>
  </div>`;
}

// ── TRACK ─────────────────────────────────────────────────
async function renderTrack(area) {
  area.innerHTML = `
  <div style="margin-top:8px">
    <div class="card">
      <div class="card-header"><div class="card-icon blue">🔍</div><div><div class="card-title">Track Your Application</div><div class="card-sub">Enter your email address</div></div></div>
      <div class="card-body">
        <div style="display:flex;gap:10px">
          <input id="track-email" placeholder="Enter your email..." style="flex:1" value="${appData.email||''}"/>
          <button class="btn btn-primary" onclick="doTrack()">Search</button>
        </div>
      </div>
    </div>
    <div id="track-results"></div>
  </div>`;
  if (appData.email) doTrack();
}

async function doTrack() {
  const email = document.getElementById('track-email').value.trim();
  if (!email) { showToast('Enter your email', 'warning'); return; }
  const res = document.getElementById('track-results');
  res.innerHTML = '<div class="loading">⏳ Looking up your application...</div>';
  try {
    const result = await apiGet('/api/track/' + encodeURIComponent(email));
    const apps = result.data || result;
    if (!apps || apps.length === 0) {
      res.innerHTML = `<div class="card"><div class="card-body" style="text-align:center;padding:40px"><div style="font-size:36px;margin-bottom:12px">🔍</div><p style="color:var(--text2)">No applications found for this email.</p></div></div>`;
      return;
    }
    const app = apps[0];
const appYear = (app.created_at||'').substring(0,4) || new Date().getFullYear();
    const stageOrder = ['applied','screening','interview','assessment','shortlist','offer','hired','rejected'];
    const stageLabels = {applied:'Application Received',screening:'CV Screening',interview:'Interview',assessment:'Assessment',shortlist:'Shortlist',offer:'Job Offer',hired:'Hired',rejected:'Not Selected'};
    const stageIcons  = {applied:'📋',screening:'🔍',interview:'🤝',assessment:'📝',shortlist:'⭐',offer:'🎊',hired:'✅',rejected:'❌'};
    const curIdx = stageOrder.indexOf(app.stage);
    res.innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="card-icon blue">📊</div>
        <div style="flex:1"><div class="card-title">Application Status</div><div class="card-sub">Ref: ${'APP-'+appYear+'-'+String(app.id).padStart(3,'0')} · ${app.job_title}</div></div>
        <span class="chip chip-blue">${stageLabels[app.stage]||app.stage}</span>
      </div>
      <div class="card-body">
        <div class="status-track">
          ${stageOrder.map((s, i) => {
            const isDone    = i < curIdx;
            const isCurrent = i === curIdx;
            const isPending = i > curIdx;
            const histItem  = (app.history||[]).find(h => h.stage === s);
            return `<div class="track-item">
              <div class="track-left">
                <div class="track-dot ${isDone?'done':isCurrent?'current':'pending'}">${isDone?'✓':stageIcons[s]||'○'}</div>
                ${i < stageOrder.length-1 ? `<div class="track-line ${isDone?'done':''}"></div>` : ''}
              </div>
              <div class="track-right">
                <div class="track-title" style="color:${isPending?'var(--text3)':'var(--text)'}">${stageLabels[s]||s}</div>
                <div class="track-date">${histItem?(histItem.created_at||'').substring(0,10):'—'}</div>
                ${!isPending && histItem ? `<div class="track-note ${isDone?'green':isCurrent?'blue':''}">${histItem.note}</div>` : ''}
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-icon amber">👤</div><div><div class="card-title">My Details</div></div></div>
      <div class="card-body">
        <div class="info-row"><span class="info-label">Name</span><span class="info-val">${app.name}</span></div>
        <div class="info-row"><span class="info-label">Position</span><span class="info-val">${app.job_title}</span></div>
        <div class="info-row"><span class="info-label">Applied</span><span class="info-val">${(app.created_at||'').substring(0,10)}</span></div>
        <div class="info-row"><span class="info-label">Type</span><span class="info-val">${app.technical?'Technical':'General'}</span></div>
        <div class="info-row"><span class="info-label">Email</span><span class="info-val">${app.email}</span></div>
      </div>
    </div>`;
  } catch(e) {
    res.innerHTML = `<div class="card"><div class="card-body" style="color:var(--red);text-align:center;padding:30px">${e.message||'Failed to look up application'}</div></div>`;
  }
}

// ── MY INTERVIEWS ─────────────────────────────────────────
function renderInterviews(area) {
  area.innerHTML = `
  <div style="margin-top:8px">
    <div class="card">
      <div class="card-header"><div class="card-icon purple">📅</div><div><div class="card-title">My Interviews</div><div class="card-sub">View and manage your interview invitations</div></div></div>
      <div class="card-body">
        <div style="display:flex;gap:10px">
          <input id="iv-email" placeholder="Enter your email..." style="flex:1" value="${appData.email||''}"/>
          <button class="btn btn-primary" onclick="doLoadInterviews()">Search</button>
        </div>
      </div>
    </div>
    <div id="interviews-results"></div>
    <div id="meeting-room" style="display:none">
      <div class="card">
        <div class="card-header">
          <div class="card-icon green">🎥</div>
          <div style="flex:1"><div class="card-title">Video Meeting</div><div class="card-sub" id="meeting-title">Meeting Room</div></div>
          <button class="btn btn-sm btn-danger" onclick="closeMeeting()">Close</button>
        </div>
        <div class="card-body p0" style="height:480px">
          <iframe id="meeting-frame" allow="camera; microphone; fullscreen; display-capture" style="width:100%;height:100%;border:none" title="Meeting"></iframe>
        </div>
      </div>
    </div>
  </div>`;
  if (appData.email) doLoadInterviews();
}

async function doLoadInterviews() {
  const email = document.getElementById('iv-email').value.trim();
  if (!email) { showToast('Enter your email', 'warning'); return; }
  appData.email = email;
  const res = document.getElementById('interviews-results');
  res.innerHTML = '<div class="loading">⏳ Loading your interviews...</div>';
  try {
    const data = await apiGet('/api/interviews/' + encodeURIComponent(email));
    interviewsList = data;
    if (!data || data.length === 0) {
      res.innerHTML = `<div class="card"><div class="card-body" style="text-align:center;padding:40px"><div style="font-size:36px;margin-bottom:12px">📅</div><p style="color:var(--text2)">No interviews found for this email.</p></div></div>`;
      return;
    }
    res.innerHTML = data.map(iv => renderInterviewCard(iv)).join('');
  } catch(e) {
    res.innerHTML = `<div class="card"><div class="card-body" style="color:var(--red);text-align:center;padding:30px">${e.message||'Failed to load interviews'}</div></div>`;
  }
}

function renderInterviewCard(iv) {
  const dt = new Date(iv.interview_date);
  const dateStr = dt.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  const timeStr = dt.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
  const isPast = dt < new Date();
  const cs = iv.candidate_status || 'pending';
  const statusBadge = { pending:'<span class="chip chip-amber">Pending</span>', accepted:'<span class="chip chip-green">Accepted ✓</span>', declined:'<span class="chip" style="background:#fee2e2;color:#991b1b">Declined ✗</span>' };

  let detailsHtml = '';
  if (iv.type === 'online') {
    detailsHtml += `<p><strong>Type:</strong> 🌐 Online`;
    if (iv.meeting_platform) detailsHtml += ` — ${iv.meeting_platform}`;
    detailsHtml += `</p>`;
    if (!isPast && cs !== 'declined') {
      const meetingUrl = iv.meeting_link || `https://meet.jit.si/wfh-interview-${iv.id}`;
      detailsHtml += `<button class="btn btn-primary btn-sm" onclick="openMeeting('${meetingUrl.replace(/'/g,"\\'")}','${iv.candidate_name.replace(/'/g,"\\'")}')" style="margin-top:8px">🎥 Join Meeting</button>`;
    }
  } else {
    detailsHtml += `<p><strong>Type:</strong> 🏢 In Person</p>`;
    if (iv.location_name) detailsHtml += `<p><strong>Location:</strong> ${iv.location_name}</p>`;
    if (iv.location_address) detailsHtml += `<p><strong>Address:</strong> ${iv.location_address}</p>`;
    if (iv.dress_code) detailsHtml += `<p><strong>Dress Code:</strong> ${iv.dress_code}</p>`;
    if (iv.what_to_bring) detailsHtml += `<p><strong>Please bring:</strong> ${iv.what_to_bring}</p>`;
    if (iv.map_link) detailsHtml += `<p><a href="${iv.map_link}" target="_blank" style="color:var(--accent)">📍 View on Google Maps</a></p>`;
  }
  if (iv.interviewer) detailsHtml += `<p><strong>Interviewer:</strong> ${iv.interviewer}</p>`;
  if (iv.notes) detailsHtml += `<p><strong>Notes:</strong> ${iv.notes}</p>`;

  let actionsHtml = '';
  if (cs === 'pending' && !isPast) {
    actionsHtml = `
      <div style="display:flex;gap:8;margin-top:12px">
        <button class="btn btn-success btn-sm" onclick="respondToInterview(${iv.id},'accepted')">✓ Accept</button>
        <button class="btn btn-danger btn-sm" onclick="respondToInterview(${iv.id},'declined')">✗ Decline</button>
      </div>`;
  } else if (cs === 'accepted') {
    actionsHtml = `<p style="color:var(--green);font-weight:600;margin-top:8px">✅ You accepted this interview</p>`;
  } else if (cs === 'declined') {
    actionsHtml = `<p style="color:var(--red);font-weight:600;margin-top:8px">❌ You declined this interview</p>`;
  }

  return `
  <div class="card">
    <div class="card-header">
      <div class="card-icon ${iv.type === 'online' ? 'blue' : 'amber'}">${iv.type === 'online' ? '🌐' : '🏢'}</div>
      <div style="flex:1">
        <div class="card-title">${iv.job_title || 'Interview'}</div>
        <div class="card-sub">${dateStr} · ${timeStr} · ${iv.duration} min</div>
      </div>
      ${statusBadge[cs] || statusBadge.pending}
    </div>
    <div class="card-body">
      <div style="font-size:14px;line-height:1.8">${detailsHtml}</div>
      ${actionsHtml}
    </div>
  </div>`;
}

async function respondToInterview(interviewId, status) {
  try {
    await apiPut('/api/interviews/respond', {
      interview_id: interviewId,
      email: appData.email,
      status: status,
    });
    showToast(status === 'accepted' ? 'Interview accepted ✓' : 'Interview declined', status === 'accepted' ? 'success' : 'error');
    doLoadInterviews();
  } catch(e) {
    showToast(e.message || 'Failed to respond', 'error');
  }
}

function openMeeting(link, name) {
  if (link && !link.includes('meet.jit.si')) {
    window.open(link, '_blank');
    return;
  }
  document.getElementById('meeting-room').style.display = 'block';
  document.getElementById('meeting-title').textContent = 'Meeting — ' + name;
  document.getElementById('meeting-frame').src = (link || `https://meet.jit.si/wfh-interview-${Date.now()}`) + '#userInfo.displayName="' + encodeURIComponent(name || 'Candidate') + '"';
  document.getElementById('meeting-room').scrollIntoView({ behavior: 'smooth' });
}

function closeMeeting() {
  document.getElementById('meeting-room').style.display = 'none';
  document.getElementById('meeting-frame').src = '';
}

function apiPut(path, body) {
  return fetch(path, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  }).then(async r => {
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Request failed');
    return data;
  });
}

// ── INIT ──────────────────────────────────────────────────
boot();
</script>
</body>
</html>
